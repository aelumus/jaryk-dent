version: "3.9"

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: jaryk-dent-web
    ports:
      - "8080:80" # локально: http://localhost:8080
    restart: unless-stopped
    volumes:
      # В dev-режиме монтируем файлы — изменения видны без rebuild
      - ./index.html:/usr/share/nginx/html/index.html:ro
      - ./css:/usr/share/nginx/html/css:ro
      - ./js:/usr/share/nginx/html/js:ro
    healthcheck:
      test: [ "CMD", "wget", "-qO-", "http://localhost/" ]
      interval: 30s
      timeout: 5s
      retries: 3
    labels:
      - "project=jaryk-dent"
      - "env=local"

# Сети (на VPS можно добавить traefik/nginx-proxy для SSL)
networks:
  default:
    name: jaryk-dent-network
