name: 🚀 CI/CD — Жарық Дент

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── JOB 1: Validate (линтинг HTML/CSS) ──────────────────────────────
  validate:
    name: 🔍 Validate HTML & CSS
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate HTML
        uses: Cyb3r-Jak3/html5validator-action@v7.2.0
        with:
          root: .
          skip_git_check: true

  # ── JOB 2: Lighthouse performance audit ─────────────────────────────
  lighthouse:
    name: 🏎️ Lighthouse Audit
    runs-on: ubuntu-latest
    needs: validate
    if: github.event_name == 'push'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install serve (локальный сервер)
        run: npm install -g serve

      - name: Start local server
        run: serve . -p 3000 &
        
      - name: Wait for server
        run: sleep 3

      - name: Run Lighthouse CI
        uses: treosh/lighthouse-ci-action@v11
        with:
          urls: "http://localhost:3000"
          # Минимальные пороги качества — pipeline упадёт если не пройдёт
          budgetPath: ".github/lighthouse-budget.json"
          uploadArtifacts: true
          temporaryPublicStorage: true

  # ── JOB 3: Build Docker image ────────────────────────────────────────
  build:
    name: 🐳 Build Docker Image
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        if: github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/jaryk-dent:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/jaryk-dent:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── JOB 4: Deploy to Netlify (только при push в main) ───────────────
  deploy:
    name: 🌐 Deploy to Netlify
    runs-on: ubuntu-latest
    needs: [validate, build]
    if: github.ref == 'refs/heads/main'
    environment:
      name: production
      url: https://jaryk-dent.netlify.app
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to Netlify
        uses: nwtgck/actions-netlify@v2.1
        with:
          publish-dir: "."
          production-branch: main
          production-deploy: true
          deploy-message: "Deploy from GitHub Actions — ${{ github.sha }}"
          github-token: ${{ secrets.GITHUB_TOKEN }}
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}

      - name: Comment PR with preview URL
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '🦷 **Preview deployed!** Site is live for review.'
            })

  # ── JOB 5: Notify (Telegram) ─────────────────────────────────────────
  notify:
    name: 📲 Telegram Notification
    runs-on: ubuntu-latest
    needs: deploy
    if: always()
    steps:
      - name: Send Telegram message
        uses: appleboy/telegram-action@v0.1.1
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          message: |
            ${{ needs.deploy.result == 'success' && '✅' || '❌' }} *Жарық Дент*
            Deploy: ${{ needs.deploy.result }}
            Branch: `${{ github.ref_name }}`
            Commit: `${{ github.sha }}`
            By: ${{ github.actor }}
